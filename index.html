<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    
    <div class="card">

        <div class="search">
            <input type="text" placeholder="Enter Your City" spellcheck="false">
            <button><img src="./search.png" alt="No Found"></button>
        </div>
        <div class="error">
            <p>City not found. Please enter a valid city name.</p>
        </div>
        <div class="weather">
            <img src="./rain.png"  alt="No Found" class="weather-icon">
            <h1 class="temp">22°c</h1>
            <h2 class="city">New York</h2>
            <div class="details">
                <div class="col">
                    <img src="./humidity.png" alt="No Found" >
                    <div>
                        <p class="humidity">50%</p>
                        <p>Humidity</p>

                    </div>
                </div>
                <div class="col">
                    <img src="./wind.png"  alt="No found" >
                    <div>
                        <p class="wind">15 km/h</p>
                        <p>Wind speed</p>
                        
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
